name: desktop ghcr build

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: decyphertek-io/stacktek

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: List desktop workspaces with a Containerfile
        id: list
        run: |
          # Each entry is "dir|name" — dir is the build context relative to
          # repo root, name is the manifest name used as the image suffix.
          entries=()
          for ctx in workspaces/web-desktops/*/*/; do
            [ -f "${ctx}Containerfile" ] || continue
            manifest="${ctx}manifest.toml"
            [ -f "$manifest" ] || { echo "WARN: no manifest.toml in $ctx — skipping"; continue; }
            name=$(grep -m1 '^name' "$manifest" | cut -d'"' -f2)
            [ -n "$name" ] || { echo "WARN: no name in $manifest — skipping"; continue; }
            # GHCR image names must be lowercase; the manifest names already are,
            # but guard against any uppercase slipping in.
            name=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            entries+=("{\"context\":\"${ctx%/}\",\"name\":\"$name\"}")
          done

          # Emit a JSON array for the matrix include key.
          json=$(printf '%s\n' "${entries[@]}" | jq -sc '.')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Discovered desktops:"
          echo "$json" | jq -r '.[] | "  \(.name)  (\(.context))"'

  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build + push ${{ matrix.name }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.name }}
        run: |
          echo "Building $IMAGE:latest from ${{ matrix.context }}"
          docker build -t "${IMAGE}:latest" -f "${{ matrix.context }}/Containerfile" "${{ matrix.context }}"
          docker push "${IMAGE}:latest"
          echo "::notice::Pushed ${IMAGE}:latest"

      - name: Prune old untagged GHCR versions for ${{ matrix.name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ env.NAMESPACE }}/${{ matrix.name }}
        run: |
          # Keep only the newest version (the :latest just pushed); delete
          # every older version so old digests don't accumulate in the package.
          # The org is the first path segment of NAMESPACE.
          ORG="${NAMESPACE%%/*}"
          # GHCR package API needs the slash in the package name URL-encoded.
          PKG_ENC=$(printf '%s' "$PACKAGE" | sed 's|/|%2F|g')
          BASE="/orgs/${ORG}/packages/container/${PKG_ENC}/versions"

          mapfile -t IDS < <(gh api --paginate "$BASE" --jq '.[].id' 2>/dev/null)
          total=${#IDS[@]}
          echo "Found $total versions for $PACKAGE"
          [ "$total" -le 1 ] && { echo "Nothing to prune."; exit 0; }

          # Newest version is the one that currently holds :latest — skip it
          # (first in the list is most recent). Delete the rest.
          keep="${IDS[0]}"
          deleted=0
          for id in "${IDS[@]:1}"; do
            if gh api -X DELETE "${BASE}/${id}" 2>/dev/null; then
              deleted=$((deleted+1))
            else
              echo "WARN: could not delete version $id (may be the tagged :latest)"
            fi
          done
          echo "::notice::Pruned $deleted old version(s) for $PACKAGE (kept newest $keep)"
