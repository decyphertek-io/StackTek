name = "openclaw"
display_name = "Openclaw"
description = "Open-source autonomous research and red-team agent."
category = "ai"
icon = "openclaw"
# The gateway service listens on 18789 (see compose.yml). The previous
# value of 8000 caused wait_for_port to time out and mark the session
# failed — there is no listener on 8000 in this stack.
web_port = 18789
# Compose service name stacktek routes traffic to. Without this, stacktek
# guesses `openclaw` (the workspace name) and falls back to the first
# service. Naming it explicitly removes the ambiguity.
primary_service = "openclaw-gateway"
data_path = "/data"

# Editable from the dashboard Config modal. The compose reads these from .env
# (env_file). At least one model provider key is required for the gateway to
# function; set more to enable more providers.
[[config_fields]]
key = "OPENCLAW_GATEWAY_TOKEN"
label = "Gateway Token"
description = "Auth token for the gateway. Generate with: openssl rand -hex 32"
secret = true
required = false

[[config_fields]]
key = "ANTHROPIC_API_KEY"
label = "Anthropic API Key"
description = "Claude API key. Set at least one model provider key."
secret = true
required = false

[[config_fields]]
key = "OPENAI_API_KEY"
label = "OpenAI API Key"
description = "OpenAI / GPT API key."
secret = true
required = false

[[config_fields]]
key = "GEMINI_API_KEY"
label = "Google Gemini API Key"
description = "Google Gemini API key."
secret = true
required = false

[[config_fields]]
key = "OPENROUTER_API_KEY"
label = "OpenRouter API Key"
description = "OpenRouter (aggregates many models)."
secret = true
required = false

[[config_fields]]
key = "CLAUDE_AI_SESSION_KEY"
label = "Claude Web Session Key"
description = "Optional — for Claude web (non-API) access."
secret = true
required = false

[[config_fields]]
key = "BRAVE_API_KEY"
label = "Brave Search API Key"
description = "Optional tool — Brave web search."
secret = true
required = false

[[config_fields]]
key = "TELEGRAM_BOT_TOKEN"
label = "Telegram Bot Token"
description = "Optional — enables the Telegram channel."
secret = true
required = false

[[config_fields]]
key = "DISCORD_BOT_TOKEN"
label = "Discord Bot Token"
description = "Optional — enables the Discord channel."
secret = true
required = false

