name = "hermes"
display_name = "Hermes Agent"
description = "Autonomous AI agent by Nous Research with web dashboard, multi-profile gateway, and full CLI/TUI interface."
category = "ai"
icon = "hermes"
web_port = 9119
data_path = "/opt/data"

# Editable from the dashboard Config modal. The compose reads these from .env.
# The dashboard + API server keys are generated by start.sh on first boot;
# the model provider keys below must be set for the agent to actually answer.
[[config_fields]]
key = "ANTHROPIC_API_KEY"
label = "Anthropic API Key"
description = "Claude API key. Set at least one model provider key."
secret = true
required = false

[[config_fields]]
key = "OPENAI_API_KEY"
label = "OpenAI API Key"
description = "OpenAI / GPT API key."
secret = true
required = false

[[config_fields]]
key = "GOOGLE_API_KEY"
label = "Google API Key"
description = "Google Gemini / AI Studio API key."
secret = true
required = false

[[config_fields]]
key = "TELEGRAM_BOT_TOKEN"
label = "Telegram Bot Token"
description = "Optional — enables the Telegram channel."
secret = true
required = false

[[config_fields]]
key = "DISCORD_BOT_TOKEN"
label = "Discord Bot Token"
description = "Optional — enables the Discord channel."
secret = true
required = false
